app = 'dinamotb'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 4001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
